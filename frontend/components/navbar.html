<header class="navbar" data-navigation-shell="user">
    <div class="navbar-left">
        <h3 id="pageTitle">
            {{title}}
        </h3>
    </div>

    <div class="user-box">
        <div class="user-info">
            <div class="user-name" data-user-name>
                Loading...
            </div>

            <div class="user-role" data-user-role>
                User
            </div>
        </div>

        <div class="avatar" data-user-avatar>
            {{avatar}}
        </div>

        <button class="ui-btn ui-btn-danger logout-btn" type="button" data-logout-button>
            Logout
        </button>
    </div>
</header>
