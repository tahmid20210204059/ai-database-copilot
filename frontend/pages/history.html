<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Query History | AI Database Copilot
</title>


<link rel="stylesheet" href="../assets/css/main.css">
<link rel="stylesheet" href="../assets/css/components.css">
<link rel="stylesheet" href="../assets/css/common-background.css">


<style>

.history-wrapper {

    max-width:1100px;

    margin:40px auto;

}



.history-grid {

    display:grid;

    grid-template-columns:repeat(
        3,
        1fr
    );

    gap:20px;

    margin:30px 0;

}



.history-card {

    padding:20px;

}



.history-title {

    font-size:14px;

    opacity:.7;

}



.history-value {

    font-size:28px;

    font-weight:700;

    margin-top:8px;

}



.status-success {

    color:#22c55e;

}



.status-failed {

    color:#ef4444;

}



.table-wrapper {

    overflow-x:auto;

}



.empty-state {

    text-align:center;

    padding:40px;

    opacity:.7;

}



.loading-state {

    text-align:center;

    padding:30px;

}



@media(max-width:700px){

    .history-grid{

        grid-template-columns:1fr;

    }

}


</style>


</head>




<body data-role="user">



<div id="common-background"></div>





<div class="history-wrapper page-content">






<section class="hero">


<h1>
Query History
</h1>


<p>
Review your previous AI generated SQL operations.
</p>


</section>









<section class="history-grid">



<div class="ui-card history-card">


<div class="history-title">

Total Queries

</div>


<div 
class="history-value"
id="totalQueries">

0

</div>


</div>







<div class="ui-card history-card">


<div class="history-title">

Successful Queries

</div>


<div 
class="history-value"
id="successQueries">

0

</div>


</div>







<div class="ui-card history-card">


<div class="history-title">

Failed Queries

</div>


<div 
class="history-value"
id="failedQueries">

0

</div>


</div>



</section>









<section class="ui-card table-wrapper">



<table>


<thead>

<tr>

<th>
Prompt
</th>

<th>
Generated SQL
</th>

<th>
Status
</th>

<th>
Execution Time
</th>

<th>
Rows
</th>

<th>
Date
</th>

</tr>


</thead>





<tbody id="historyTableBody">


<tr>

<td 
colspan="6"
class="loading-state">

Loading history...

</td>

</tr>


</tbody>




</table>



</section>








<br>


<a href="dashboard.html"
class="ui-btn ui-btn-primary">

← Dashboard

</a>






</div>









<script src="../assets/js/api.js"></script>

<script src="../assets/js/auth-guard.js"></script>

<script src="../assets/js/common-background.js"></script>

<script src="../assets/js/user-guard.js"></script>

<script src="../assets/js/navigation.js"></script>

<script src="../assets/js/history.js"></script>



</body>

</html>
