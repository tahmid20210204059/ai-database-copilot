<!DOCTYPE html>

<html lang="en">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
AI Database Copilot Components
</title>



<link rel="stylesheet" href="../assets/css/main.css">

<link rel="stylesheet" href="../assets/css/components.css">

<link rel="stylesheet" href="../assets/css/effects.css">

<link rel="stylesheet" href="../assets/css/showcase.css">


</head>




<body>


<!-- =====================================
AI GLOBE BACKGROUND
===================================== -->


<!-- =====================================
PREMIUM GRID BACKGROUND
===================================== -->


<div class="ai-background">

    <div class="ai-grid"></div>

</div>







<div class="showcase-container">



<div class="showcase-header">


<h1>

AI Database Copilot UI System

</h1>


<p>

Reusable enterprise components and design patterns.

</p>


</div>









<section class="showcase-section">


<h2 class="showcase-title">

Buttons

</h2>



<div class="demo-box">


<div class="demo-actions">


<button class="ui-btn ui-btn-primary">

Generate SQL

</button>



<button class="ui-btn ui-btn-success">

Execute Query

</button>



<button class="ui-btn ui-btn-danger">

Delete

</button>



</div>


</div>



</section>









<section class="showcase-section">


<h2 class="showcase-title">

Stat Cards

</h2>



<div class="showcase-grid">



<div class="ui-card premium-hover">


<div class="ui-card-title">

Database Connections

</div>


<div class="ui-card-value">

12

</div>


</div>






<div class="ui-card premium-hover">


<div class="ui-card-title">

AI Queries

</div>


<div class="ui-card-value">

245

</div>


</div>






<div class="ui-card premium-hover">


<div class="ui-card-title">

Success Rate

</div>


<div class="ui-card-value">

98%

</div>


</div>




</div>


</section>









<section class="showcase-section">


<h2 class="showcase-title">

Feedback System

</h2>



<div class="demo-box">


<div class="demo-actions">


<button
class="ui-btn ui-btn-primary"
onclick="showToast('Connection Saved','success')">

Success Toast

</button>




<button
class="ui-btn ui-btn-danger"
onclick="showToast('SQL Rejected','error')">

Error Toast

</button>



</div>



</div>



</section>









<section class="showcase-section">


<h2 class="showcase-title">

Loading State

</h2>



<div class="demo-box">


<div class="ui-loader"></div>


<p>

Generating SQL...

</p>


</div>



</section>









<section class="showcase-section">


<h2 class="showcase-title">

Input System

</h2>



<div class="demo-box">


<input

class="input"

placeholder="Ask AI about your database..."

>


</div>



</section>









<section class="showcase-section">


<h2 class="showcase-title">

Status

</h2>



<div class="demo-box">


<span class="badge badge-success">

Connected

</span>



<span class="badge badge-danger">

Failed

</span>



</div>



</section>








</div>







<script src="../assets/js/components.js"></script>


</body>


</html>
