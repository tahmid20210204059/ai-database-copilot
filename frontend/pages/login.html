<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
AI Database Copilot Login
</title>


<link rel="stylesheet" href="../assets/css/main.css">

<link rel="stylesheet" href="../assets/css/components.css">

<link rel="stylesheet" href="../assets/css/common-background.css">


</head>


<body>


<div id="common-background"></div>



<div class="login-container">



<div class="login-card ui-card">



<div class="logo login-logo">


<div class="logo-icon">

AI

</div>


<span>

Database Copilot

</span>


</div>





<h1>
Welcome Back
</h1>


<p>
Login to your AI database workspace
</p>





<form id="loginForm">



<label>
Email
</label>


<input
type="email"
id="email"
class="input"
placeholder="Enter your email"
required
>



<label>
Password
</label>


<input
type="password"
id="password"
class="input"
placeholder="Enter your password"
required
>



<button
type="submit"
class="ui-btn ui-btn-primary"
id="loginButton">

Login

</button>



</form>





<div id="loginMessage"></div>



</div>



</div>





<script src="../assets/js/common-background.js"></script>

<script src="../assets/js/components.js"></script>

<script src="../assets/js/auth.js"></script>


</body>

</html>
